model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "disabled"
model_reasoning_effort = "high"
personality = "friendly"

[shell_environment_policy]
include_only = ["PATH", "HOME", "USER", "SHELL"]

[features]
fast_mode = false
multi_agent = false
memories = false
shell_tool = true
shell_snapshot = false
smart_approvals = false
codex_hooks = false
undo = false

[plugins."github@openai-curated"]
enabled = true

[projects."/home/itameshi/dev/lookie"]
trust_level = "trusted"
